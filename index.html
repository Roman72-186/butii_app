<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keychain Shop - Интернет-магазин брелков</title>

    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
</head>
<body>
    <!-- Loader -->
    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Main Container -->
    <div id="app" class="container" style="display: none;">

        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo" onclick="showProducts()">
                    <span class="logo-icon" id="shopLogo">🔑</span>
                    <span class="logo-text" id="shopName">Keychain Shop</span>
                </div>
                <div class="header-actions">
                    <button class="header-btn" id="cartBtn" onclick="showCart()">
                        <span class="header-btn-icon">🛒</span>
                        <span class="header-btn-badge" id="cartBadge" style="display: none;">0</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- ===================================
             СЕКЦИЯ 1: КАТАЛОГ ТОВАРОВ
             =================================== -->
        <section class="products-section" id="productsSection">
            <!-- Категории -->
            <div class="categories-scroll">
                <div class="categories" id="categories"></div>
            </div>

            <!-- Сетка товаров -->
            <div class="products-grid" id="productsGrid"></div>
        </section>

        <!-- ===================================
             СЕКЦИЯ 2: ДЕТАЛИ ТОВАРА
             =================================== -->
        <section class="product-details-section" id="productDetailsSection" style="display: none;">
            <div class="section-header">
                <button class="back-btn" onclick="showProducts()">
                    <span class="back-icon">←</span> Назад
                </button>
                <h2>Детали товара</h2>
            </div>

            <!-- Детали товара -->
            <div class="product-details-container" id="productDetails"></div>
        </section>

        <!-- ===================================
             СЕКЦИЯ 3: КОРЗИНА
             =================================== -->
        <section class="cart-section" id="cartSection" style="display: none;">
            <div class="section-header">
                <button class="back-btn" onclick="showProducts()">
                    <span class="back-icon">←</span> Назад
                </button>
                <h2>Корзина</h2>
            </div>

            <!-- Товары в корзине -->
            <div class="cart-container">
                <div class="cart-items" id="cartItems"></div>
                
                <div class="cart-summary">
                    <div class="cart-total">
                        <span>Итого:</span>
                        <span id="cartTotal">0 ₽</span>
                    </div>
                    <button class="btn-primary" id="checkoutBtn" onclick="showCheckout()" style="display: none;">
                        <span>Оформить заказ</span>
                        <span class="btn-arrow">→</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- ===================================
             СЕКЦИЯ 4: ОФОРМЛЕНИЕ ЗАКАЗА
             =================================== -->
        <section class="checkout-section" id="checkoutSection" style="display: none;">
            <div class="section-header">
                <button class="back-btn" onclick="showCart()">
                    <span class="back-icon">←</span> Назад
                </button>
                <h2>Оформление заказа</h2>
            </div>

            <!-- Форма оформления заказа -->
            <div class="checkout-container" id="checkoutForm"></div>
        </section>

        <!-- ===================================
             СЕКЦИЯ 5: УСПЕШНЫЙ ЗАКАЗ
             =================================== -->
        <section class="success-section" id="successSection" style="display: none;">
            <div class="success-animation">
                <div class="success-icon">✓</div>
            </div>
            <h2>Заказ оформлен!</h2>
            <p class="success-message">
                Ваш заказ принят. Мы свяжемся с вами для подтверждения.
            </p>
            <div class="success-details" id="successDetails"></div>
            <div class="success-actions">
                <button class="btn-primary" onclick="showMyOrders()">
                    <span>Мои заказы</span>
                    <span class="btn-arrow">→</span>
                </button>
                <button class="btn-secondary" onclick="resetApp()">
                    Заказать ещё
                </button>
            </div>
        </section>

        <!-- ===================================
             СЕКЦИЯ 6: МОИ ЗАКАЗЫ
             =================================== -->
        <section class="my-orders-section" id="myOrdersSection" style="display: none;">
            <div class="section-header">
                <button class="back-btn" onclick="showProducts()">
                    <span class="back-icon">←</span> Назад
                </button>
                <h2>Мои заказы</h2>
            </div>

            <!-- Пустое состояние -->
            <div id="noOrders" class="empty-state">
                <div class="empty-icon">📦</div>
                <h3>Заказов пока нет</h3>
                <p>После оформления заказа он появится здесь</p>
                <button class="btn-secondary" onclick="showProducts()">Сделать заказ</button>
            </div>

            <!-- Список заказов -->
            <div id="ordersList" class="orders-list" style="display: none;"></div>
        </section>

    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/telegram.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
